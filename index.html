<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Manager - Auto-Retry</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;
        const App = () => {
            const [data, setData] = useState([]);
            const [status, setStatus] = useState('Connecting...');

            const fetchFeed = async () => {
                try {
                    const response = await fetch('/api/feed');
                    if (!response.ok) throw new Error('API Error');
                    const json = await response.json();
                    setData(json);
                    setStatus('Live');
                } catch (err) {
                    setStatus('Feed Offline - Retrying...');
                    // Automatically trigger a re-fetch attempt on failure
                }
            };

            useEffect(() => {
                // Initial fetch
                fetchFeed();
                // Polling interval
                const interval = setInterval(fetchFeed, 2000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="p-6">
                    <div className="flex items-center gap-2 mb-6">
                        <div className={`w-3 h-3 rounded-full ${status === 'Live' ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></div>
                        <span className="font-bold">{status}</span>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {data.map(item => (
                            <div key={item.code} className="bg-white/5 p-4 rounded-xl border border-white/10">
                                <div className="text-gray-400 text-xs">{item.symbol} {item.expiry}</div>
                                <div className="text-xl font-bold">{item.ltp}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
