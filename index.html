<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Pulse Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;
        const App = () => {
            const [data, setData] = useState([]);
            const [status, setStatus] = useState('Connecting...');

            const fetchFeed = async () => {
                try {
                    const response = await fetch('/api/feed');
                    const json = await response.json();
                    if (!json.success) throw new Error(json.error);
                    setData(json.data);
                    setStatus('Live');
                } catch (err) {
                    setStatus('Feed Offline');
                }
            };

            useEffect(() => {
                fetchFeed();
                const interval = setInterval(fetchFeed, 2000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="p-4 md:p-6">
                    <div className="flex items-center gap-2 mb-6">
                        <div className={`w-3 h-3 rounded-full ${status === 'Live' ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></div>
                        <span className="font-bold">{status}</span>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        {data.map(item => (
                            <div key={item.code} className="bg-white/5 p-4 rounded-xl border border-white/10 hover:border-white/20 transition-all">
                                <div className="flex justify-between text-xs text-gray-400 mb-1">
                                    <span>{item.symbol}</span>
                                    <span>{item.expiry}</span>
                                </div>
                                <div className="text-2xl font-bold">{item.ltp.toLocaleString()}</div>
                                <div className={`text-sm ${item.change >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                    {item.change > 0 ? '+' : ''}{item.change} ({item.changePercent}%)
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
