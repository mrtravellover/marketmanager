<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazaar - Live Commodity Prices</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { font-family: 'Inter', sans-serif; }
  body { background:#000; }
  .no-scrollbar::-webkit-scrollbar { display:none; }
  .stripe-bg {
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 2px, transparent 2px, transparent 8px);
  }
</style>
</head>
<body class="bg-black text-white">
<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useMemo } = React;

/* ---------- Icons ---------- */
const Icon = ({ path, className = "w-5 h-5", strokeWidth = 2 }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth}
       strokeLinecap="round" strokeLinejoin="round" className={className}>
    {path}
  </svg>
);
const IconMenu       = (p) => <Icon {...p} path={<><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></>} />;
const IconSearch     = (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />;
const IconChevronDown= (p) => <Icon {...p} path={<polyline points="6 9 12 15 18 9"/>} />;
const IconX          = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
const IconPlus       = (p) => <Icon {...p} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
const IconEdit       = (p) => <Icon {...p} path={<><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></>} />;
const IconSliders    = (p) => <Icon {...p} path={<><line x1="5" y1="21" x2="5" y2="13"/><line x1="5" y1="9" x2="5" y2="3"/><line x1="12" y1="21" x2="12" y2="11"/><line x1="12" y1="7" x2="12" y2="3"/><line x1="19" y1="21" x2="19" y2="15"/><line x1="19" y1="11" x2="19" y2="3"/><circle cx="5" cy="11" r="2"/><circle cx="12" cy="9" r="2"/><circle cx="19" cy="13" r="2"/></>} />;
const IconShare      = (p) => <Icon {...p} path={<><circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/><line x1="8.3" y1="10.7" x2="15.7" y2="6.5"/><line x1="8.3" y1="13.3" x2="15.7" y2="17.5"/></>} />;
const IconEye        = (p) => <Icon {...p} path={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></>} />;

/* ---------- Helpers ---------- */
// Featured commodities shown larger at the top of FNO section
const FEATURED = ["MCX Gold", "MCX Silver"];

function formatPrice(val) {
  if (!val && val !== 0) return "—";
  return val.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function ltpFontSizeClass(str, featured) {
  const len = (str || "").length;
  if (featured) {
    if (len > 11) return "text-[22px]";
    if (len > 8)  return "text-[26px]";
    return "text-[30px]";
  }
  if (len > 11) return "text-[15px]";
  if (len > 8)  return "text-[18px]";
  return "text-[22px]";
}

/* ---------- Card components ---------- */
const InstrumentCard = ({ item }) => {
  const up        = item.change >= 0;
  const barColor  = up ? "bg-emerald-500" : "bg-red-500";
  const textColor = up ? "text-emerald-400" : "text-red-400";
  const sign      = item.change > 0 ? "+" : "";
  const ltpStr    = formatPrice(item.ltp);

  return (
    <div className="flex rounded-2xl overflow-hidden border border-white/10 bg-[#0d0d0d] min-w-0">
      <div className={`w-[5px] shrink-0 ${barColor}`}></div>
      <div className="flex-1 min-w-0 px-2.5 py-4 text-center">
        <div className="text-[13px] font-medium text-gray-200 leading-tight truncate">{item.displayName}</div>
        {item.expiry ? <div className="text-[11px] text-gray-500 mt-0.5">{item.expiry}</div> : null}
        <div className={`font-bold text-white mt-2 tabular-nums leading-tight ${ltpFontSizeClass(ltpStr, false)}`}>
          {ltpStr}
        </div>
        <div className={`text-[12px] font-medium mt-1 tabular-nums truncate ${textColor}`}>
          {sign}{item.change?.toFixed(2)} ({sign}{item.changePercent?.toFixed(2)}%)
        </div>
      </div>
    </div>
  );
};

const FeaturedCard = ({ item }) => {
  const up        = item.change >= 0;
  const barColor  = up ? "bg-emerald-500" : "bg-red-500";
  const textColor = up ? "text-emerald-400" : "text-red-400";
  const sign      = item.change > 0 ? "+" : "";
  const ltpStr    = formatPrice(item.ltp);

  return (
    <div className="flex rounded-2xl overflow-hidden border border-white/15 bg-gradient-to-b from-[#141210] to-[#0d0d0d] min-w-0">
      <div className={`w-[6px] shrink-0 ${barColor}`}></div>
      <div className="flex-1 min-w-0 px-4 py-5 text-center">
        <div className="text-[15px] font-semibold text-gray-100 leading-tight truncate">{item.displayName}</div>
        {item.expiry ? <div className="text-[12px] text-gray-500 mt-0.5">{item.expiry}</div> : null}
        <div className={`font-extrabold text-white mt-2 tabular-nums leading-tight ${ltpFontSizeClass(ltpStr, true)}`}>
          {ltpStr}
        </div>
        <div className={`text-[13px] font-semibold mt-1.5 tabular-nums truncate ${textColor}`}>
          {sign}{item.change?.toFixed(2)} ({sign}{item.changePercent?.toFixed(2)}%)
        </div>
        {/* Extra detail row for featured cards */}
        <div className="flex justify-between mt-3 px-1">
          <div className="text-center">
            <div className="text-[10px] text-gray-600 uppercase tracking-wide">Buy</div>
            <div className="text-[12px] text-gray-300 tabular-nums">{formatPrice(item.buy)}</div>
          </div>
          <div className="text-center">
            <div className="text-[10px] text-gray-600 uppercase tracking-wide">Sell</div>
            <div className="text-[12px] text-gray-300 tabular-nums">{formatPrice(item.sell)}</div>
          </div>
          <div className="text-center">
            <div className="text-[10px] text-gray-600 uppercase tracking-wide">High</div>
            <div className="text-[12px] text-gray-300 tabular-nums">{formatPrice(item.high)}</div>
          </div>
          <div className="text-center">
            <div className="text-[10px] text-gray-600 uppercase tracking-wide">Low</div>
            <div className="text-[12px] text-gray-300 tabular-nums">{formatPrice(item.low)}</div>
          </div>
        </div>
      </div>
    </div>
  );
};

const SectionLabel = ({ children }) => (
  <div className="text-center text-gray-500 text-[13px] font-medium py-3 uppercase tracking-widest">{children}</div>
);

const IconPill = ({ children }) => (
  <div className="w-10 h-10 rounded-full flex items-center justify-center text-gray-300 bg-white/5 border border-white/10">
    {children}
  </div>
);

/* ---------- Polling config ---------- */
const POLL_MS          = 2000;
const MAX_BACKOFF_MS   = 16000;
const FAILS_FOR_WARN   = 3;

/* ---------- App ---------- */
const App = () => {
  const [data,        setData]        = useState([]);
  const [status,      setStatus]      = useState("Connecting...");
  const [updatedAt,   setUpdatedAt]   = useState("");
  const [searchOpen,  setSearchOpen]  = useState(false);
  const [query,       setQuery]       = useState("");

  // Use a ref for data so the poll loop always sees the latest value without re-registering the effect
  const dataRef = useRef([]);

  useEffect(() => {
    let cancelled = false;
    let timer     = null;
    let fails     = 0;

    const poll = async () => {
      try {
        const controller = new AbortController();
        const abort      = setTimeout(() => controller.abort(), 9000);
        const res        = await fetch("/api/feed", { signal: controller.signal });
        clearTimeout(abort);

        const json = await res.json();
        if (!json.success) throw new Error(json.error || "Feed error");

        if (cancelled) return;
        fails = 0;

        // Only update state for cards whose values actually changed
        const incoming = json.data || [];
        const prev     = dataRef.current;

        const hasChange = incoming.length !== prev.length ||
          incoming.some((item, i) => {
            const old = prev[i];
            return !old ||
              old.ltp           !== item.ltp           ||
              old.buy           !== item.buy           ||
              old.sell          !== item.sell          ||
              old.change        !== item.change        ||
              old.changePercent !== item.changePercent ||
              old.high          !== item.high          ||
              old.low           !== item.low;
          });

        if (hasChange) {
          dataRef.current = incoming;
          setData(incoming);
        }

        setStatus("Live");
        setUpdatedAt(new Date().toLocaleTimeString("en-GB"));

      } catch (err) {
        if (cancelled) return;
        fails++;
        console.warn(`Feed poll failed (${fails} in a row):`, err.message);

        if (fails >= FAILS_FOR_WARN) {
          setStatus(fails < FAILS_FOR_WARN + 2 ? "Reconnecting..." : "Feed Offline");
        } else {
          setStatus(prev => prev === "Live" ? "Reconnecting..." : prev);
        }
      }

      if (cancelled) return;
      const delay = fails === 0
        ? POLL_MS
        : Math.min(POLL_MS * 2 ** fails, MAX_BACKOFF_MS);
      timer = setTimeout(poll, delay);
    };

    poll();
    return () => { cancelled = true; if (timer) clearTimeout(timer); };
  }, []);

  const q           = query.trim().toLowerCase();
  const matches     = (item) => !q ||
    item.displayName.toLowerCase().includes(q) ||
    item.symbol.toLowerCase().includes(q);

  const filtered    = data.filter(matches);
  const featured    = filtered.filter(i => FEATURED.includes(i.displayName));
  const rest        = filtered.filter(i => !FEATURED.includes(i.displayName));

  return (
    <div className="max-w-md mx-auto min-h-screen flex flex-col">

      {/* Header */}
      <div className="flex items-center justify-between px-4 pt-5 pb-4 gap-3">
        <div className="flex items-center gap-4 min-w-0">
          <IconMenu className="w-6 h-6 text-white shrink-0" />
          <span className="text-2xl font-bold truncate">Bazaar</span>
        </div>
        {searchOpen ? (
          <div className="flex items-center gap-2 flex-1 bg-white/5 border border-white/10 rounded-full pl-4 pr-2 py-2">
            <IconSearch className="w-4 h-4 text-gray-400 shrink-0" />
            <input
              autoFocus
              type="text"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="Search Gold, Silver, Crude..."
              className="flex-1 min-w-0 bg-transparent text-[14px] text-gray-100 placeholder-gray-500 outline-none"
            />
            <button
              onClick={() => { setSearchOpen(false); setQuery(""); }}
              className="w-7 h-7 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 shrink-0"
            >
              <IconX className="w-4 h-4" />
            </button>
          </div>
        ) : (
          <button
            onClick={() => setSearchOpen(true)}
            className="w-9 h-9 rounded-full flex items-center justify-center text-gray-300 hover:text-white hover:bg-white/10"
          >
            <IconSearch className="w-5 h-5" />
          </button>
        )}
      </div>

      {/* Toolbar */}
      <div className="flex items-center justify-between px-4 pb-4">
        <div className="flex items-center gap-2 bg-white/5 border border-white/10 rounded-full pl-4 pr-3 py-2.5">
          <span className="text-[15px] text-gray-100">MCX Futures</span>
          <IconChevronDown className="w-4 h-4 text-gray-400" />
        </div>
        <div className="flex items-center gap-2">
          <IconPill><IconPlus   className="w-5 h-5" /></IconPill>
          <IconPill><IconEdit   className="w-4 h-4" /></IconPill>
          <IconPill><IconSliders className="w-5 h-5" /></IconPill>
          <IconPill><IconShare  className="w-5 h-5" /></IconPill>
          <IconPill><IconEye    className="w-5 h-5" /></IconPill>
        </div>
      </div>

      {/* Content */}
      <div className="flex-1 overflow-y-auto no-scrollbar px-4 pb-4">

        {/* Status banner */}
        {status !== "Live" && (
          <div className="flex items-center gap-2 mb-4 text-sm">
            <div className={`w-2.5 h-2.5 rounded-full ${status === "Feed Offline" ? "bg-red-500 animate-pulse" : "bg-amber-500 animate-pulse"}`}></div>
            <span className="text-gray-400">{status}</span>
          </div>
        )}

        {/* Featured: Gold, Silver */}
        {featured.length > 0 && (
          <>
            <SectionLabel>Near Month</SectionLabel>
            <div className="grid grid-cols-2 gap-3 mb-3">
              {featured.map(item => <FeaturedCard key={item.symbol} item={item} />)}
            </div>
          </>
        )}

        {/* Rest of commodities */}
        {rest.length > 0 && (
          <>
            {featured.length > 0 && <SectionLabel>Other Commodities</SectionLabel>}
            <div className="grid grid-cols-3 gap-3 mb-1">
              {rest.map(item => <InstrumentCard key={item.symbol} item={item} />)}
            </div>
          </>
        )}

        {/* Empty search state */}
        {q && !filtered.length && (
          <div className="text-center text-gray-500 text-sm py-10">
            No instruments match "{query}"
          </div>
        )}

        {/* Connecting state */}
        {!q && !data.length && status === "Connecting..." && (
          <div className="text-center text-gray-600 text-sm py-16">
            Fetching live rates...
          </div>
        )}

        <div className="mt-8 mb-4">
          <span className="text-lg font-extrabold text-white/90">Bazaar</span>
        </div>
      </div>

      {/* Footer */}
      <div className="stripe-bg text-center text-[13px] text-gray-400 py-2 border-t border-white/10">
        Prices updated at: <span className="text-gray-200">{updatedAt || "--:--:--"}</span>
      </div>

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
