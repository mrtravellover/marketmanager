<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazaar - Live Commodity Prices</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 2px, transparent 2px, transparent 8px);
  }

<body class="bg-black text-white">
<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useEffect, useMemo } = React;

/* ---------- Icons (inline, lucide-style) ---------- */
const Icon = ({ path, className = "w-5 h-5", strokeWidth = 2 }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth}
       strokeLinecap="round" strokeLinejoin="round" className={className}>
    {path}
  </svg>
);
const IconMenu = (p) => <Icon {...p} path={<>
  <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
</>} />;
const IconSearch = (p) => <Icon {...p} path={<>
  <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
</>} />;
const IconChevronDown = (p) => <Icon {...p} path={<polyline points="6 9 12 15 18 9"/>} />;
const IconX = (p) => <Icon {...p} path={<>
  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
</>} />;
const IconPlus = (p) => <Icon {...p} path={<>
  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
</>} />;
const IconEdit = (p) => <Icon {...p} path={<>
  <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
</>} />;
const IconSliders = (p) => <Icon {...p} path={<>
  <line x1="5" y1="21" x2="5" y2="13"/><line x1="5" y1="9" x2="5" y2="3"/>
  <line x1="12" y1="21" x2="12" y2="11"/><line x1="12" y1="7" x2="12" y2="3"/>
  <line x1="19" y1="21" x2="19" y2="15"/><line x1="19" y1="11" x2="19" y2="3"/>
  <circle cx="5" cy="11" r="2"/><circle cx="12" cy="9" r="2"/><circle cx="19" cy="13" r="2"/>
</>} />;
const IconShare = (p) => <Icon {...p} path={<>
  <circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/>
  <line x1="8.3" y1="10.7" x2="15.7" y2="6.5"/><line x1="8.3" y1="13.3" x2="15.7" y2="17.5"/>
</>} />;
const IconEye = (p) => <Icon {...p} path={<>
  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/>
</>} />;

/* ---------- Data helpers ---------- */
// Canonical display order for FNO instrument groups
const GROUP_ORDER = ["Gold", "Silver", "Crude Oil", "Copper", "Aluminium", "Zinc", "Gold Mini", "Silver Mini"];
// Which spot/cash instruments to show up top, and in what order
const SPOT_ORDER = ["Gold", "Silver", "USDINR"];

function canonicalName(rawSymbol) {
  const s = (rawSymbol || "").toUpperCase().replace(/[^A-Z]/g, "");
  if (s.includes("USDINR")) return "USDINR";
  if (s.includes("GOLDM") || s.includes("GOLDMINI")) return "Gold Mini";
  if (s.includes("GOLD")) return "Gold";
  if (s.includes("SILVERM") || s.includes("SILVERMINI")) return "Silver Mini";
  if (s.includes("SILVER")) return "Silver";
  if (s.includes("CRUDEOIL") || s.includes("CRUDE")) return "Crude Oil";
  if (s.includes("COPPER")) return "Copper";
  if (s.includes("ALUMINI") || s.includes("ALUMINIUM") || s.includes("ALUMINUM")) return "Aluminium";
  if (s.includes("ZINC")) return "Zinc";
  return rawSymbol || "—";
}

function parseExpiryDate(expiry) {
  if (!expiry) return null;
  const d = new Date(expiry);
  if (!isNaN(d)) return d;
  // Fallback: try "05Aug" style strings against current/next year
  const m = String(expiry).match(/^(\d{1,2})([A-Za-z]{3})$/);
  if (m) {
    const now = new Date();
    const guess = new Date(`${m[1]} ${m[2]} ${now.getFullYear()}`);
    return isNaN(guess) ? null : guess;
  }
  return null;
}

// Groups where a specific expiry pattern should always be featured, rather than
// just "earliest expiry". Currently: prefer the contract expiring on day 1-10
// of its month — this keeps working automatically as contracts roll forward
// month to month, without needing to hardcode a date.
const PRIORITY_DAY_GROUPS = ["Gold", "Silver"];
const PRIORITY_DAY_MIN = 1;
const PRIORITY_DAY_MAX = 10;

function organize(data) {
  const spot = [];
  const byGroup = {};

  data.forEach(item => {
    const name = canonicalName(item.symbol);
    const hasExpiry = !!(item.expiry && item.expiry.trim());
    if (!hasExpiry) {
      if (SPOT_ORDER.includes(name)) spot.push({ ...item, displayName: name });
      return;
    }
    if (!GROUP_ORDER.includes(name)) return;
    if (!byGroup[name]) byGroup[name] = [];
    byGroup[name].push({ ...item, displayName: name });
  });

  // sort each group's contracts by expiry ascending, keep near (first) & far (second)
  Object.keys(byGroup).forEach(name => {
    byGroup[name].sort((a, b) => {
      const da = parseExpiryDate(a.expiry), db = parseExpiryDate(b.expiry);
      if (da && db) return da - db;
      return 0;
    });

    // For priority groups, move whichever contract expires on day 1-10 of its
    // month to the front, so it becomes "near" and gets featured — even if a
    // different contract expires chronologically sooner (e.g. day 31).
    if (PRIORITY_DAY_GROUPS.includes(name)) {
      const list = byGroup[name];
      const priorityIndex = list.findIndex(c => {
        const d = parseExpiryDate(c.expiry);
        return d && d.getDate() >= PRIORITY_DAY_MIN && d.getDate() <= PRIORITY_DAY_MAX;
      });
      if (priorityIndex > 0) {
        const [priorityContract] = list.splice(priorityIndex, 1);
        list.unshift(priorityContract);
      }
    }
  });

  spot.sort((a, b) => SPOT_ORDER.indexOf(a.displayName) - SPOT_ORDER.indexOf(b.displayName));

  const near = [];
  const far = [];
  GROUP_ORDER.forEach(name => {
    const list = byGroup[name] || [];
    if (list[0]) near.push(list[0]);
    if (list[1]) far.push(list[1]);
  });

  return { spot, near, far };
}

/* ---------- UI Pieces ---------- */
function formatLtp(item) {
  return item.ltp ? item.ltp.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "—";
}

// Shrinks the rate text as the number of digits grows, so long MCX prices
// (e.g. "1,42,744.00") never clip or overflow the card.
function ltpFontSizeClass(str, featured) {
  const len = str.length;
  if (featured) {
    if (len > 11) return "text-[22px]";
    if (len > 8) return "text-[26px]";
    return "text-[30px]";
  }
  if (len > 11) return "text-[15px]";
  if (len > 8) return "text-[18px]";
  return "text-[22px]";
}

const InstrumentCard = ({ item }) => {
  const up = item.change >= 0;
  const barColor = up ? "bg-emerald-500" : "bg-red-500";
  const textColor = up ? "text-emerald-400" : "text-red-400";
  const sign = item.change > 0 ? "+" : "";
  const ltpStr = formatLtp(item);
  return (
    <div className="flex rounded-2xl overflow-hidden border border-white/10 bg-[#0d0d0d] min-w-0">
      <div className={`w-[5px] shrink-0 ${barColor}`}></div>
      <div className="flex-1 min-w-0 px-2.5 py-4 text-center">
        <div className="text-[15px] font-medium text-gray-200 leading-tight truncate">{item.displayName}</div>
        {item.expiry ? <div className="text-[13px] text-gray-500 mt-0.5">{item.expiry}</div> : null}
        <div className={`font-bold text-white mt-2 tabular-nums leading-tight ${ltpFontSizeClass(ltpStr, false)}`}>
          {ltpStr}
        </div>
        <div className={`text-[13px] font-medium mt-1 tabular-nums truncate ${textColor}`}>
          {sign}{item.change} ({sign}{item.changePercent}%)
        </div>
      </div>
    </div>
  );
};

// Larger, featured treatment for the instruments we want maximum priority on (Gold, Silver).
const FeaturedInstrumentCard = ({ item }) => {
  const up = item.change >= 0;
  const barColor = up ? "bg-emerald-500" : "bg-red-500";
  const textColor = up ? "text-emerald-400" : "text-red-400";
  const sign = item.change > 0 ? "+" : "";
  const ltpStr = formatLtp(item);
  return (
    <div className="flex rounded-2xl overflow-hidden border border-white/15 bg-gradient-to-b from-[#141210] to-[#0d0d0d] min-w-0">
      <div className={`w-[6px] shrink-0 ${barColor}`}></div>
      <div className="flex-1 min-w-0 px-4 py-5 text-center">
        <div className="text-[16px] font-semibold text-gray-100 leading-tight truncate">{item.displayName}</div>
        {item.expiry ? <div className="text-[13px] text-gray-500 mt-0.5">{item.expiry}</div> : null}
        <div className={`font-extrabold text-white mt-2 tabular-nums leading-tight ${ltpFontSizeClass(ltpStr, true)}`}>
          {ltpStr}
        </div>
        <div className={`text-[14px] font-semibold mt-1.5 tabular-nums truncate ${textColor}`}>
          {sign}{item.change} ({sign}{item.changePercent}%)
        </div>
      </div>
    </div>
  );
};

const SectionLabel = ({ children }) => (
  <div className="text-center text-gray-500 text-[15px] font-medium py-3">{children}</div>
);

const IconPill = ({ children }) => (
  <div className="w-10 h-10 rounded-full flex items-center justify-center text-gray-300 bg-white/5 border border-white/10">
    {children}
  </div>
);

/* ---------- Demo fallback (used only if /api/feed is unreachable, e.g. static preview) ---------- */
const MOCK_DATA = [
  { code: "GOLDSPOT", symbol: "GOLD", expiry: "", ltp: 4028.60, change: -22.92, changePercent: -0.57 },
  { code: "SILVERSPOT", symbol: "SILVER", expiry: "", ltp: 56.692, change: -1.919, changePercent: -3.27 },
  { code: "USDINRSPOT", symbol: "USDINR", expiry: "", ltp: 96.329, change: 0.074, changePercent: 0.08 },
  { code: "GOLD05AUG", symbol: "GOLD", expiry: "05Aug", ltp: 141115.00, change: -1142.00, changePercent: -0.80 },
  { code: "SILVER04SEP", symbol: "SILVER", expiry: "04Sep", ltp: 218366.00, change: -4823.00, changePercent: -2.16 },
  { code: "CRUDEOIL20JUL", symbol: "CRUDEOIL", expiry: "20Jul", ltp: 7661.00, change: 77.00, changePercent: 1.02 },
  { code: "COPPER31JUL", symbol: "COPPER", expiry: "31Jul", ltp: 1305.50, change: -6.40, changePercent: -0.49 },
  { code: "ALUMINIUM31JUL", symbol: "ALUMINIUM", expiry: "31Jul", ltp: 341.00, change: -2.65, changePercent: -0.77 },
  { code: "ZINC31JUL", symbol: "ZINC", expiry: "31Jul", ltp: 374.35, change: -2.45, changePercent: -0.65 },
  { code: "GOLDM05AUG", symbol: "GOLDM", expiry: "05Aug", ltp: 141123.00, change: -1069.00, changePercent: -0.75 },
  { code: "SILVERM31AUG", symbol: "SILVERM", expiry: "31Aug", ltp: 221700.00, change: -4537.00, changePercent: -2.01 },
  { code: "GOLD05OCT", symbol: "GOLD", expiry: "05Oct", ltp: 142744.00, change: -1697.00, changePercent: -1.17 },
  { code: "SILVER04DEC", symbol: "SILVER", expiry: "04Dec", ltp: 224300.00, change: -4964.00, changePercent: -2.17 },
  { code: "CRUDEOIL19AUG", symbol: "CRUDEOIL", expiry: "19Aug", ltp: 7646.00, change: 72.00, changePercent: 0.95 },
  { code: "COPPER31AUG", symbol: "COPPER", expiry: "31Aug", ltp: 1318.90, change: -6.85, changePercent: -0.52 },
  { code: "ALUMINIUM31AUG", symbol: "ALUMINIUM", expiry: "31Aug", ltp: 341.25, change: -2.80, changePercent: -0.81 },
  { code: "ZINC31AUG", symbol: "ZINC", expiry: "31Aug", ltp: 371.10, change: -2.65, changePercent: -0.71 },
  { code: "GOLDM04SEP", symbol: "GOLDM", expiry: "04Sep", ltp: 142251.00, change: -1279.00, changePercent: -0.89 },
  { code: "SILVERM30NOV", symbol: "SILVERM", expiry: "30Nov", ltp: 228300.00, change: -4681.00, changePercent: -2.01 },
];

/* ---------- App ---------- */
const POLL_INTERVAL_MS = 2000;      // normal polling rate when feed is healthy
const MAX_BACKOFF_MS = 16000;       // cap how slow we back off to
const FAILS_BEFORE_DEMO = 3;        // don't flash "Demo Data" on one blip — only after a real streak

const App = () => {
  const [data, setData] = useState([]);
  const [status, setStatus] = useState("Connecting...");
  const [updatedAt, setUpdatedAt] = useState("");
  const [searchOpen, setSearchOpen] = useState(false);
  const [query, setQuery] = useState("");

  useEffect(() => {
    let cancelled = false;
    let timer = null;
    let consecutiveFailures = 0;

    const fetchFeed = async () => {
      try {
        // AbortController so a slow request doesn't stack up behind the next poll
        const controller = new AbortController();
        const abortTimer = setTimeout(() => controller.abort(), 9000);
        const response = await fetch("/api/feed", { signal: controller.signal });
        clearTimeout(abortTimer);

        const json = await response.json();
        if (!json.success) throw new Error(json.error || "Feed returned an error");

        if (cancelled) return;
        consecutiveFailures = 0;
        setData(json.data);
        setStatus("Live");
        setUpdatedAt(new Date().toLocaleTimeString("en-GB"));
      } catch (err) {
        if (cancelled) return;
        consecutiveFailures++;
        console.warn(`Feed poll failed (${consecutiveFailures} in a row):`, err.message);

        if (consecutiveFailures >= FAILS_BEFORE_DEMO) {
          setStatus(prev => (prev === "Live" && consecutiveFailures < FAILS_BEFORE_DEMO + 2
            ? "Reconnecting..."
            : "Feed Offline"));
          setData(prevData => (prevData.length ? prevData : MOCK_DATA));
        } else {
          // Brief blip — keep showing last good data and a soft "reconnecting" hint,
          // don't jump straight to Demo/Offline for a single missed poll.
          setStatus(prevStatus => (prevStatus === "Live" ? "Reconnecting..." : prevStatus));
        }
      }

      if (cancelled) return;
      // Back off the polling rate while failing, so we don't hammer a struggling
      // provider — return to normal speed the moment it's healthy again.
      const delay = consecutiveFailures === 0
        ? POLL_INTERVAL_MS
        : Math.min(POLL_INTERVAL_MS * 2 ** consecutiveFailures, MAX_BACKOFF_MS);
      timer = setTimeout(fetchFeed, delay);
    };

    fetchFeed();
    return () => { cancelled = true; if (timer) clearTimeout(timer); };
  }, []);

  const { spot, near, far } = useMemo(() => organize(data), [data]);

  const q = query.trim().toLowerCase();
  const matches = (item) => !q || item.displayName.toLowerCase().includes(q) || (item.symbol || "").toLowerCase().includes(q);

  const spotFiltered = spot.filter(matches);
  const nearFiltered = near.filter(matches);
  const farFiltered = far.filter(matches);

  // Gold and Silver get maximum priority: pulled out into a larger, featured row
  // above the rest of the FNO near-month grid.
  const featuredNear = nearFiltered.filter(i => i.displayName === "Gold" || i.displayName === "Silver");
  const restNear = nearFiltered.filter(i => i.displayName !== "Gold" && i.displayName !== "Silver");

  return (
    <div className="max-w-md mx-auto min-h-screen flex flex-col">
      {/* Header */}
      <div className="flex items-center justify-between px-4 pt-5 pb-4 gap-3">
        <div className="flex items-center gap-4 min-w-0">
          <IconMenu className="w-6 h-6 text-white shrink-0" />
          <span className="text-2xl font-bold truncate">Bazaar</span>
        </div>
        {searchOpen ? (
          <div className="flex items-center gap-2 flex-1 bg-white/5 border border-white/10 rounded-full pl-4 pr-2 py-2">
            <IconSearch className="w-4 h-4 text-gray-400 shrink-0" />
            <input
              autoFocus
              type="text"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="Search Gold, Silver, Crude Oil..."
              className="flex-1 min-w-0 bg-transparent text-[14px] text-gray-100 placeholder-gray-500 outline-none"
            />
            <button
              onClick={() => { setSearchOpen(false); setQuery(""); }}
              className="w-7 h-7 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 shrink-0"
              aria-label="Close search"
            >
              <IconX className="w-4 h-4" />
            </button>
          </div>
        ) : (
          <button
            onClick={() => setSearchOpen(true)}
            className="w-9 h-9 rounded-full flex items-center justify-center text-gray-300 hover:text-white hover:bg-white/10"
            aria-label="Search"
          >
            <IconSearch className="w-5 h-5" />
          </button>
        )}
      </div>

      {/* Watchlist selector + tool icons */}
      <div className="flex items-center justify-between px-4 pb-4">
        <div className="flex items-center gap-2 bg-white/5 border border-white/10 rounded-full pl-4 pr-3 py-2.5">
          <span className="text-[15px] text-gray-100">MCX Futures</span>
          <IconChevronDown className="w-4 h-4 text-gray-400" />
        </div>
        <div className="flex items-center gap-2">
          <IconPill><IconPlus className="w-5 h-5" /></IconPill>
          <IconPill><IconEdit className="w-4 h-4" /></IconPill>
          <IconPill><IconSliders className="w-5 h-5" /></IconPill>
          <IconPill><IconShare className="w-5 h-5" /></IconPill>
          <IconPill><IconEye className="w-5 h-5" /></IconPill>
        </div>
      </div>

      {/* Content */}
      <div className="flex-1 overflow-y-auto no-scrollbar px-4 pb-4">
        {status !== "Live" && (
          <div className="flex items-center gap-2 mb-4 text-sm">
            <div className={`w-2.5 h-2.5 rounded-full ${status === "Feed Offline" ? "bg-red-500 animate-pulse" : "bg-amber-500"}`}></div>
            <span className="text-gray-400">{status}</span>
          </div>
        )}

        {/* Pinned: Gold, Silver, USDINR spot prices always on top */}
        {spotFiltered.length > 0 && (
          <div className="grid grid-cols-3 gap-3 mb-1">
            {spotFiltered.map(item => <InstrumentCard key={item.code || item.displayName} item={item} />)}
          </div>
        )}

        {/* Maximum priority: Gold and Silver FNO, shown larger and first */}
        {featuredNear.length > 0 && (
          <>
            <SectionLabel>FNO Near Month</SectionLabel>
            <div className="grid grid-cols-2 gap-3 mb-3">
              {featuredNear.map(item => <FeaturedInstrumentCard key={item.code} item={item} />)}
            </div>
          </>
        )}

        {restNear.length > 0 && (
          <div className="grid grid-cols-3 gap-3 mb-1">
            {restNear.map(item => <InstrumentCard key={item.code} item={item} />)}
          </div>
        )}

        {farFiltered.length > 0 && (
          <>
            <SectionLabel>FNO Far Month</SectionLabel>
            <div className="grid grid-cols-3 gap-3 mb-1">
              {farFiltered.map(item => <InstrumentCard key={item.code} item={item} />)}
            </div>
          </>
        )}

        {q && !spotFiltered.length && !nearFiltered.length && !farFiltered.length && (
          <div className="text-center text-gray-500 text-sm py-10">No instruments match "{query}"</div>
        )}

        <div className="mt-8 mb-4">
          <span className="text-lg font-extrabold text-white/90">Bazaar</span>
        </div>
      </div>

      {/* Updated bar */}
      <div className="stripe-bg text-center text-[13px] text-gray-400 py-2 border-t border-white/10">
        Prices updated at: <span className="text-gray-200">{updatedAt || "--:--:--"}</span>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body
